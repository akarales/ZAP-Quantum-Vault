# cargo-deny configuration for ZAP Quantum Vault.
# Run locally with: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
# Check the platforms we actually ship on.
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
]
all-features = false

[advisories]
# Fail on any known security advisory in the dependency tree.
# (RUSTSEC database; refreshed by `cargo deny` / CI.)
yanked = "deny"
ignore = []

[licenses]
# Allow only well-known permissive / weak-copyleft licenses. Add to this list
# deliberately (with review) rather than loosening the policy.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "CC0-1.0",
    "Unlicense",
    "BSL-1.0",
    "OpenSSL",
]
confidence-threshold = 0.9
# Per-crate license clarifications can be added here if a crate's license is
# detected with low confidence.
exceptions = []

[bans]
# Surface accidental duplicate versions of the same crate (bloat / drift) and
# hard-deny anything we never want linked in a security-sensitive binary.
multiple-versions = "warn"
wildcards = "deny"
deny = [
    # Prefer the audited `ring`/RustCrypto stack over OpenSSL bindings.
    { name = "openssl" },
    { name = "openssl-sys" },
]

[sources]
# Only crates.io and the standard git sources are permitted by default.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
